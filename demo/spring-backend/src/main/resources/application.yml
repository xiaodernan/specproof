server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/specproof_demo
    username: demo_user
    password: demo_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
      password: demo_redis_pass
  rabbitmq:
    host: localhost
    port: 5672
    username: demo_user
    password: demo_pass

springdoc:
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: demo-secret-key-at-least-256-bits-long-for-hs256
    expiration-ms: 3600000

name: P1 Quality Gates

on:
  push:
    branches: [feature/p1-*]
  pull_request:
    branches: [feature/p1-*, release/*]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Ruff check
        run: python -m ruff check .
      - name: Ruff format
        run: python -m ruff format --check .
      - name: Mypy (formal scope)
        run: python -m mypy --exclude "tests/|artifacts/|demo/" .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: P0.5 Archive Verifier
        run: python scripts/verify_p0_5_archive.py
      - name: Bandit (High/Medium only)
        run: python -m bandit -r agent storage api scripts -ll

  unit-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/unit -v --tb=short
      - name: Integration tests (no Docker)
        run: python -m pytest tests/integration/test_differential.py -v --tb=short

  docker-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: specproof_root
          MYSQL_DATABASE: specproof_phase0
          MYSQL_USER: specproof
          MYSQL_PASSWORD: specproof_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -pspecproof_root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        env:
          REDIS_PASSWORD: specproof_pass
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a specproof_pass ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4.0-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: specproof
          RABBITMQ_DEFAULT_PASS: specproof_pass
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MYSQL_HOST: localhost
      MYSQL_PORT: "3306"
      MYSQL_USER: specproof
      MYSQL_PASSWORD: specproof_pass
      MYSQL_DATABASE: specproof_phase0
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: specproof_pass
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: specproof
      RABBITMQ_PASSWORD: specproof_pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root -pspecproof_root 2>/dev/null && break
            echo "Waiting for MySQL... $i"
            sleep 2
          done
      - name: MySQL integration tests
        run: python -m pytest tests/integration/test_job_lifecycle.py -v --tb=short
      - name: Fault injection tests
        run: python -m pytest tests/integration/test_fault_scenarios.py -v --tb=short

  # Manual gate — requires real provider credentials and INFRA_TOKEN secret
  provider-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: provider-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Provider Smoke (requires secrets)
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python scripts/provider_smoke.py

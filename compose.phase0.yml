# SpecProof Phase 0 — Minimal Infrastructure
# All containers have health checks and resource limits.
# Start: docker compose -f compose.phase0.yml up -d
# Stop:  docker compose -f compose.phase0.yml down -v

name: specproof-phase0

services:
  mysql:
    image: mysql:8.4
    container_name: specproof-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-specproof_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-specproof_phase0}
      MYSQL_USER: ${MYSQL_USER:-specproof}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-specproof_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-specproof_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  mongodb:
    image: mongo:7.0
    container_name: specproof-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-specproof_phase0}
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-specproof}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-specproof_pass}
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.4
    container_name: specproof-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms256m -Xmx512m"
      ELASTIC_PASSWORD: ${ES_PASSWORD:-specproof_pass}
      xpack.security.enabled: "true"
      xpack.security.enrollment.enabled: "false"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ES_PASSWORD:-specproof_pass} http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
    ulimits:
      memlock:
        soft: -1
        hard: -1

  redis:
    image: redis:7.4-alpine
    container_name: specproof-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-specproof_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-specproof_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: specproof-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-specproof}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-specproof_pass}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: specproof-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-specproof_pass}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

volumes:
  mysql-data:
  mongodb-data:
  es-data:
  redis-data:
  rabbitmq-data:
  minio-data:
